name: Build Executables

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            arch: x64
            name: win64
            artifact: ssh-tunnel-manager-win64
          - os: ubuntu-latest
            arch: x64
            name: linux64
            artifact: ssh-tunnel-manager-linux64
          - os: macos-14
            arch: arm64
            name: macos-arm64
            artifact: ssh-tunnel-manager-macos-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build UI files (Unix)
        if: runner.os != 'Windows'
        run: |
          pyside6-uic tunnel.ui -o tunnel.py
          pyside6-uic tunnelconfig.ui -o tunnelconfig.py
          pyside6-rcc icons.qrc -o icons.py

      - name: Build UI files (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          pyside6-uic.exe tunnel.ui -o tunnel.py
          pyside6-uic.exe tunnelconfig.ui -o tunnelconfig.py
          pyside6-rcc.exe icons.qrc -o icons.py

      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --windowed --name ssh-tunnel-manager --add-data "icons;icons" --add-data "config.example.yml;." app.py

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
          pyinstaller --onefile --name ssh-tunnel-manager --add-data "icons:icons" --add-data "config.example.yml:." app.py

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --onefile --windowed --name ssh-tunnel-manager --add-data "icons:icons" --add-data "config.example.yml:." app.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/ssh-tunnel-manager*
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            if [ -f "ssh-tunnel-manager" ]; then
              chmod +x ssh-tunnel-manager
              tar -czvf "../${name}.tar.gz" ssh-tunnel-manager
            elif [ -f "ssh-tunnel-manager.exe" ]; then
              zip "../${name}.zip" ssh-tunnel-manager.exe
            elif [ -d "ssh-tunnel-manager.app" ]; then
              tar -czvf "../${name}.tar.gz" ssh-tunnel-manager.app
            fi
            cd ..
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
